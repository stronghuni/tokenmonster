  <g fill="#ffffff">
    <!-- egg silhouette, pixel style, 22x22 -->
    <rect x="9" y="3" width="4" height="1"/>
    <rect x="8" y="4" width="6" height="1"/>
    <rect x="7" y="5" width="8" height="1"/>
    <rect x="6" y="6" width="10" height="1"/>
    <rect x="5" y="7" width="12" height="2"/>
    <rect x="4" y="9" width="14" height="7"/>
    <rect x="5" y="16" width="12" height="1"/>
    <rect x="6" y="17" width="10" height="1"/>
    <rect x="7" y="18" width="8" height="1"/>
  </g>
  <!-- fire spots cut out as holes -->
  <g fill="#1d1d1f">
    <rect x="8" y="10" width="2" height="2"/>
    <rect x="9" y="9"  width="1" height="1"/>
    <rect x="12" y="12" width="2" height="2"/>
    <rect x="13" y="11" width="1" height="1"/>
