<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="320" height="320">
  <rect width="32" height="32" fill="#f5f5f0"/>
  <!-- Egg shape (fire pattern) -->
  <g>
    <!-- outline -->
    <rect x="12" y="6" width="8" height="1" fill="#3a1a0a"/>
    <rect x="10" y="7" width="2" height="1" fill="#3a1a0a"/>
    <rect x="20" y="7" width="2" height="1" fill="#3a1a0a"/>
    <rect x="9" y="8" width="1" height="2" fill="#3a1a0a"/>
    <rect x="22" y="8" width="1" height="2" fill="#3a1a0a"/>
    <rect x="8" y="10" width="1" height="4" fill="#3a1a0a"/>
    <rect x="23" y="10" width="1" height="4" fill="#3a1a0a"/>
    <rect x="7" y="14" width="1" height="6" fill="#3a1a0a"/>
    <rect x="24" y="14" width="1" height="6" fill="#3a1a0a"/>
    <rect x="8" y="20" width="1" height="3" fill="#3a1a0a"/>
    <rect x="23" y="20" width="1" height="3" fill="#3a1a0a"/>
    <rect x="9" y="23" width="2" height="1" fill="#3a1a0a"/>
    <rect x="21" y="23" width="2" height="1" fill="#3a1a0a"/>
    <rect x="11" y="24" width="10" height="1" fill="#3a1a0a"/>

    <!-- base cream -->
    <rect x="12" y="7" width="8" height="1" fill="#fff4d6"/>
    <rect x="10" y="8" width="12" height="2" fill="#fff4d6"/>
    <rect x="9" y="10" width="14" height="4" fill="#fff4d6"/>
    <rect x="8" y="14" width="16" height="6" fill="#ffe8a8"/>
    <rect x="9" y="20" width="14" height="3" fill="#ffd060"/>
    <rect x="11" y="23" width="10" height="1" fill="#ffb020"/>

    <!-- shine -->
    <rect x="11" y="9" width="2" height="1" fill="#ffffff"/>
    <rect x="10" y="10" width="1" height="3" fill="#ffffff"/>
    <rect x="11" y="11" width="1" height="2" fill="#ffffff"/>

    <!-- fire spots -->
    <rect x="14" y="13" width="2" height="2" fill="#ff5520"/>
    <rect x="13" y="14" width="1" height="1" fill="#ff5520"/>
    <rect x="16" y="14" width="1" height="1" fill="#ff5520"/>
    <rect x="14" y="14" width="2" height="1" fill="#ffcc20"/>

    <rect x="18" y="16" width="2" height="2" fill="#ff5520"/>
    <rect x="18" y="17" width="2" height="1" fill="#ffcc20"/>
    <rect x="17" y="17" width="1" height="1" fill="#ff5520"/>
    <rect x="20" y="17" width="1" height="1" fill="#ff5520"/>

    <rect x="12" y="19" width="2" height="1" fill="#ff5520"/>
    <rect x="19" y="20" width="2" height="1" fill="#ff5520"/>

    <!-- crack hint -->
    <rect x="15" y="10" width="1" height="1" fill="#8a4a1a"/>
    <rect x="16" y="11" width="1" height="1" fill="#8a4a1a"/>
    <rect x="15" y="12" width="1" height="1" fill="#8a4a1a"/>
  </g>
</svg>
